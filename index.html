<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Voona — Le moins cher en magasin</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
<header class="bg-gradient-to-br from-emerald-600 to-emerald-700 text-white p-5">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold">voona</h1>
    <p class="text-emerald-100 text-sm">Le moins cher en magasin</p>
    <input id="q" class="w-full mt-4 p-3 rounded-xl text-slate-900 outline-none" placeholder="Rechercher (Nutella, Coca, Evian...)" autofocus/>
  </div>
</header>
<main class="max-w-2xl mx-auto p-4" id="r"></main>
<script>
const API = "https://voona-backend.onrender.com";
const q=document.getElementById('q'),r=document.getElementById('r');let t;
const esc=s=>String(s||'').replace(/[<>&'"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;',"'":'&#39;','"':'&quot;'}[c]));
async function search(v){
  if(v.length<3){r.innerHTML='';return;}
  r.innerHTML='<div class="p-8 text-center text-slate-500">Recherche...</div>';
  try{
    const resp=await fetch(API+'/api/products/search?q='+encodeURIComponent(v));
    const items=await resp.json();
    if(!Array.isArray(items)||!items.length){
      r.innerHTML='<div class="p-8 text-center text-slate-500">Aucun produit trouvé pour "'+esc(v)+'"</div>';
      return;
    }
    r.innerHTML=items.slice(0,15).map(p=>'<div class="bg-white rounded-xl p-3 mb-2 flex gap-3 cursor-pointer hover:shadow-md transition" onclick="loadPrices(\''+p.barcode+'\',\''+esc(p.name).replace(/\\/g,'\\\\').replace(/\'/g,"\\\'")+'\')">'+(p.imageUrl?'<img src="'+p.imageUrl+'" class="w-14 h-14 rounded-lg object-cover bg-slate-100" onerror="this.style.display=\'none\'"/>':'<div class="w-14 h-14 rounded-lg bg-slate-100"></div>')+'<div class="flex-1 min-w-0"><div class="font-semibold truncate">'+esc(p.name)+'</div><div class="text-xs text-slate-500 truncate">'+esc(p.brand||'')+' · '+p.barcode+'</div></div></div>').join('');
  }catch(e){r.innerHTML='<div class="bg-rose-50 p-4 rounded-xl text-rose-700">Erreur: '+esc(e.message)+'<br/><span class="text-xs">Le backend Render dort peut-être (free tier). Réessayez dans 30 sec.</span></div>';}
}
async function loadPrices(code,name){
  r.innerHTML='<button onclick="location.reload()" class="text-emerald-600 mb-3">&larr; Retour</button><div class="bg-white p-4 rounded-xl"><h2 class="text-xl font-bold mb-2">'+esc(name)+'</h2><div class="text-slate-500">Chargement des prix...</div></div>';
  try{
    const resp=await fetch(API+'/api/prices/'+code);
    const d=await resp.json();
    const prices=d.prices||[];
    const cheapest=prices[0];
    const html='<button onclick="location.reload()" class="text-emerald-600 mb-3">&larr; Retour</button>'+(d.product&&d.product.imageUrl?'<img src="'+d.product.imageUrl+'" class="w-32 h-32 rounded-xl object-cover bg-slate-100 mb-3"/>':'')+'<div class="bg-white p-4 rounded-xl"><h2 class="text-xl font-bold mb-1">'+esc(name)+'</h2><div class="text-xs text-slate-400 mb-3">'+code+'</div>'+(prices.length?'<div class="bg-emerald-50 p-3 rounded-xl mb-3"><div class="text-xs uppercase font-bold text-emerald-700">Meilleur prix</div><div class="text-2xl font-bold text-emerald-700">'+cheapest.price.toFixed(2)+'€</div><div class="text-sm">chez '+esc(cheapest.storeName)+'</div></div><div class="space-y-1">'+prices.map((p,i)=>'<div class="flex justify-between p-2 '+(i===0?'bg-emerald-50 rounded':'border-b')+'"><span>'+esc(p.storeName)+'</span><b>'+p.price.toFixed(2)+'€</b></div>').join('')+'</div>':'<div class="text-slate-500 text-center py-8">Pas encore de prix réels.<br/>Soyez le premier à contribuer sur<br/><a href="https://prices.openfoodfacts.org/app?product_code='+code+'" target="_blank" class="text-emerald-600 underline">Open Prices</a></div>')+'</div>';
    r.innerHTML=html;
  }catch(e){r.innerHTML='<button onclick="location.reload()" class="text-emerald-600 mb-3">&larr; Retour</button><div class="bg-rose-50 p-4 rounded-xl text-rose-700">Erreur: '+esc(e.message)+'</div>';}
}
q.addEventListener('input',e=>{clearTimeout(t);t=setTimeout(()=>search(e.target.value),400);});
</script>
</body>
</html>
